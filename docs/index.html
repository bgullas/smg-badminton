<!DOCTYPE html>
<html lang="en" style="overflow-x:hidden">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMG Badminton">
<meta name="theme-color" content="#1A56DB">
<title>SMG Badminton Club</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-top"></div>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-icon">🏸</div>
      <h1>SMG Badminton</h1>
      <p>Sengkang Marsiling Group</p>
    </div>
    <form id="login-form">
      <div class="input-group">
        <span class="ig-icon">👤</span>
        <input type="text" id="login-user" placeholder="Username" autocapitalize="none">
      </div>
      <div class="input-group">
        <span class="ig-icon">🔒</span>
        <input type="password" id="login-pass" placeholder="Password">
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <div id="login-error"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="safe-top"></div>

  <!-- Header -->
  <header class="hdr" id="hdr">
    <button id="back-btn" class="hdr-btn hidden">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <span id="page-title" class="hdr-title">Home</span>
    <button id="hdr-plus" class="hdr-btn hidden" onclick="onHeaderPlus()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </header>

  <!-- Pages -->
  <div class="pages" id="pages">

    <!-- HOME -->
    <div id="pg-home" class="pg">
      <div class="home-hero">
        <div>
          <div class="home-greeting" id="home-greeting">Hello!</div>
          <div class="home-role" id="home-role"></div>
          <div class="home-date" id="home-date"></div>
        </div>
        <div class="home-badge">🏸</div>
      </div>
      <div id="next-session-card"></div>
      <div class="section-label">Quick Actions</div>
      <div class="app-grid" id="app-grid"></div>
      <div class="section-label" style="margin-top:4px">Club Overview</div>
      <div class="stats-row" id="stats-row"></div>
    </div>

    <!-- MEMBERS -->
    <div id="pg-members" class="pg hidden">
      <div class="searchbar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="member-search" placeholder="Search members…">
      </div>
      <div id="members-list"></div>
    </div>

    <!-- SESSIONS (combined: Schedule + Attend + Games) -->
    <div id="pg-sessions" class="pg hidden">
      <!-- Inner Tabs -->
      <div class="inner-tabs">
        <button class="itab active" data-itab="schedule" onclick="switchInnerTab('schedule')">📅 Schedule</button>
        <button class="itab" data-itab="attend" onclick="switchInnerTab('attend')">✅ Attend</button>
        <button class="itab admin-tab" data-itab="games" onclick="switchInnerTab('games')">🏆 Games</button>
      </div>

      <!-- Schedule sub-page -->
      <div id="itab-schedule" class="itab-content active-tab">
        <div id="sessions-list"></div>
      </div>

      <!-- Attend sub-page -->
      <div id="itab-attend" class="itab-content">
        <div class="info-bar green">
          <span>✅</span><span>Confirm you will attend a session</span>
        </div>
        <div class="field-block"><label class="flabel">Select Session</label>
          <select id="att-session" class="sel" onchange="onAttSessionChange()"><option value="">— Select session —</option></select>
        </div>
        <div class="field-block"><label class="flabel">Your Name</label>
          <select id="att-member" class="sel"><option value="">— Select your name —</option></select>
        </div>
        <button class="action-btn green-btn" onclick="submitAttendance()">✅ &nbsp;Confirm Attendance</button>
        <div class="list-label hidden" id="att-label">Who's Attending</div>
        <div id="att-list"></div>
      </div>

      <!-- Games sub-page -->
      <div id="itab-games" class="itab-content admin-tab">
        <div class="field-block">
          <select id="games-session-sel" class="sel" onchange="loadGames()">
            <option value="">— Select a session —</option>
          </select>
        </div>
        <div id="games-list"></div>
      </div>
    </div>

    <!-- BOOKING -->
    <div id="pg-booking" class="pg hidden">
      <div class="info-bar blue">
        <span>🔖</span><span>Confirm your ActiveSG booking</span>
      </div>
      <div class="field-block"><label class="flabel">Select Session</label>
        <select id="book-session" class="sel" onchange="onBookSessionChange()"><option value="">— Select session —</option></select>
      </div>
      <div class="field-block"><label class="flabel">Your Name</label>
        <select id="book-member" class="sel"><option value="">— Select your name —</option></select>
      </div>
      <button class="action-btn blue-btn" onclick="submitBooking()">🔖 &nbsp;Confirm Booking</button>
      <div class="list-label hidden" id="book-label">Booked Members</div>
      <div id="book-list"></div>
    </div>

    <!-- PAYMENTS -->
    <div id="pg-payments" class="pg hidden">
      <div class="field-block"><label class="flabel">Select Session</label>
        <select id="pay-session" class="sel" onchange="loadPaymentPage()"><option value="">— Select session —</option></select>
      </div>
      <div id="pay-list"></div>
    </div>

    <!-- REPORTS HUB -->
    <div id="pg-reports" class="pg hidden">
      <div class="report-grid" id="report-grid"></div>
    </div>

    <!-- REPORT: ATTENDANCE -->
    <div id="pg-ratt" class="pg hidden">
      <div class="field-block"><select id="ratt-session" class="sel" onchange="loadRAttendance()"><option value="">— Select session —</option></select></div>
      <div id="ratt-content"></div>
    </div>

    <!-- REPORT: BOOKINGS -->
    <div id="pg-rbook" class="pg hidden">
      <div class="field-block"><select id="rbook-session" class="sel" onchange="loadRBookings()"><option value="">— Select session —</option></select></div>
      <div id="rbook-content"></div>
    </div>

    <!-- REPORT: RESULTS -->
    <div id="pg-rresults" class="pg hidden">
      <div class="field-block"><select id="rres-session" class="sel" onchange="loadRResults()"><option value="">— Select session —</option></select></div>
      <div id="rres-content"></div>
    </div>

    <!-- REPORT: PLAYER STATS -->
    <div id="pg-rplayers" class="pg hidden">
      <div id="rplayer-content"></div>
    </div>

    <!-- REPORT: TEAM HISTORY -->
    <div id="pg-rteams" class="pg hidden">
      <div class="field-block"><label class="flabel">Player 1</label>
        <select id="rteam-p1" class="sel"></select>
      </div>
      <div class="field-block"><label class="flabel">Player 2 (optional)</label>
        <select id="rteam-p2" class="sel"></select>
      </div>
      <button class="action-btn blue-btn" onclick="loadRTeams()">🔍 &nbsp;Search Games</button>
      <div id="rteam-content" style="margin-top:16px"></div>
    </div>

    <!-- REPORT: PAYMENTS -->
    <div id="pg-rpayments" class="pg hidden">
      <div class="field-block"><select id="rpay-session" class="sel" onchange="loadRPayments()"><option value="">— Select session —</option></select></div>
      <div id="rpay-content"></div>
    </div>

  </div><!-- /pages -->

  <!-- Bottom Nav (5 items) -->
  <nav class="bnav" id="bnav">
    <button class="ntab active" data-pg="home">
      <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Home</span>
    </button>
    <button class="ntab admin-tab" data-pg="members">
      <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Members</span>
    </button>
    <button class="ntab" data-pg="sessions">
      <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Sessions</span>
    </button>
    <button class="ntab" data-pg="booking">
      <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Booking</span>
    </button>
    <button class="ntab admin-tab" data-pg="payments">
      <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Payments</span>
    </button>
    <button class="ntab" data-pg="reports">
      <svg class="nico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Reports</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- BOTTOM SHEET MODALS -->

<!-- Add Member -->
<div id="sheet-member" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-pill"></div>
    <div class="sheet-hdr"><span>Add Member</span><button onclick="closeSheet('sheet-member')">✕</button></div>
    <div class="sheet-body">
      <div class="field-block"><label class="flabel">Full Name *</label><input type="text" id="m-name" class="finput" placeholder="e.g. John Tan"></div>
      <div class="field-block"><label class="flabel">Phone Number</label><input type="tel" id="m-phone" class="finput" placeholder="e.g. 91234567"></div>
      <div class="field-row">
        <div class="field-block" style="flex:1"><label class="flabel">Type</label>
          <select id="m-type" class="finput"><option value="permanent">Permanent</option><option value="temporary">Temporary</option></select>
        </div>
        <div class="field-block" style="flex:1"><label class="flabel">Category</label>
          <select id="m-category" class="finput"><option value="competitive">Competitive</option><option value="pleasure">Pleasure</option></select>
        </div>
      </div>
      <button class="action-btn blue-btn" onclick="addMember()">Add Member</button>
    </div>
  </div>
</div>

<!-- Add Session -->
<div id="sheet-session" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-pill"></div>
    <div class="sheet-hdr"><span>New Game Session</span><button onclick="closeSheet('sheet-session')">✕</button></div>
    <div class="sheet-body">
      <div class="field-block"><label class="flabel">Date *</label><input type="date" id="s-date" class="finput"></div>
      <div class="field-row">
        <div class="field-block" style="flex:1"><label class="flabel">Start</label><input type="time" id="s-start" class="finput" value="07:00"></div>
        <div class="field-block" style="flex:1"><label class="flabel">End</label><input type="time" id="s-end" class="finput" value="09:00"></div>
      </div>
      <div class="field-block"><label class="flabel">Location</label><input type="text" id="s-location" class="finput" value="Yio Chu Kang Sports Hall"></div>
      <div class="field-block">
        <label class="flabel">Courts (2 default, max 5)</label>
        <div id="courts-container">
          <div class="court-row"><input type="text" class="finput court-input" placeholder="e.g. Court 5"><button class="court-del hidden" onclick="removeCourt(this)">✕</button></div>
          <div class="court-row"><input type="text" class="finput court-input" placeholder="e.g. Court 6"><button class="court-del hidden" onclick="removeCourt(this)">✕</button></div>
        </div>
        <button class="add-court-btn" id="add-court-btn" onclick="addCourt()">＋ Add Court</button>
      </div>
      <button class="action-btn blue-btn" onclick="addSession()">Create Session</button>
    </div>
  </div>
</div>

<!-- Add Game -->
<div id="sheet-game" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-pill"></div>
    <div class="sheet-hdr"><span>Add Game</span><button onclick="closeSheet('sheet-game')">✕</button></div>
    <div class="sheet-body">
      <div class="team-block blue-block">
        <div class="team-title">🔵 Team A</div>
        <div class="field-row">
          <div class="field-block" style="flex:1"><label class="flabel">Player 1</label><select id="g-a1" class="finput"></select></div>
          <div class="field-block" style="flex:1"><label class="flabel">Player 2</label><select id="g-a2" class="finput"></select></div>
        </div>
      </div>
      <div class="vs-bar">VS</div>
      <div class="team-block red-block">
        <div class="team-title">🔴 Team B</div>
        <div class="field-row">
          <div class="field-block" style="flex:1"><label class="flabel">Player 1</label><select id="g-b1" class="finput"></select></div>
          <div class="field-block" style="flex:1"><label class="flabel">Player 2</label><select id="g-b2" class="finput"></select></div>
        </div>
      </div>
      <button class="action-btn blue-btn" style="margin-top:8px" onclick="addGame()">Add Game</button>
    </div>
  </div>
</div>

<!-- Score -->
<div id="sheet-score" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-pill"></div>
    <div class="sheet-hdr"><span>Enter Score</span><button onclick="closeSheet('sheet-score')">✕</button></div>
    <div class="sheet-body">
      <div class="score-entry">
        <div class="score-side"><div class="score-label" id="score-name-a">Team A</div><input type="number" id="score-a" class="score-input" min="0" max="30" placeholder="0"></div>
        <div class="score-vs">–</div>
        <div class="score-side"><div class="score-label" id="score-name-b">Team B</div><input type="number" id="score-b" class="score-input" min="0" max="30" placeholder="0"></div>
      </div>
      <input type="hidden" id="score-game-id">
      <button class="action-btn blue-btn" onclick="submitScore()">Save Score</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/app.js"></script>
</body>
</html>
